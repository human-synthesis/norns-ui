name: Release

# Publishes to npm on tag push matching `v*` (e.g. `v0.0.6`).
# Tag the commit AFTER bumping `package.json` version locally:
#   git tag v0.0.6 && git push origin v0.0.6
#
# Requires the `NPM_TOKEN` secret (npm automation token, scope: read+write).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.16'

      - name: Install dependencies
        run: bun install

      - name: Run unit tests
        run: bun test tests/

      - name: Check type-shim drift (strict)
        run: bun run check:shims:strict

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag v$TAG_VERSION does not match package.json $PKG_VERSION"
            exit 1
          fi

      - name: Publish to npm
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          bun publish --access public
